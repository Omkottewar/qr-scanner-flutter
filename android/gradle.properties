org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Windows cross-drive workaround: pub cache lives on C:\ but the project is on
# D:\. Kotlin's incremental compiler tries to compute a relative path between
# them and crashes with "this and base files have different roots". Disabling
# incremental Kotlin compilation is the accepted workaround — builds are a bit
# slower but succeed. Track https://youtrack.jetbrains.com/issue/KT-52625.
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
